name: security-test-stack

services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PUBLIC_PORT:-18080}:8080"
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      notification-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [backend]

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      SERVICE_NAME: auth-service
      PORT: "8001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [backend]

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    expose:
      - "8002"
    environment:
      SERVICE_NAME: user-service
      PORT: "8002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8002/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [backend]

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    expose:
      - "8003"
    environment:
      SERVICE_NAME: order-service
      PORT: "8003"
      USER_SERVICE_URL: http://user-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8003/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks: [backend]

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    expose:
      - "8004"
    environment:
      SERVICE_NAME: notification-service
      PORT: "8004"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8004/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [backend]

networks:
  backend:
    driver: bridge
