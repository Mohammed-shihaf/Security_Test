[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --junit-xml=reports/junit.xml
    --json-report
    --json-report-file=reports/results.json
    --json-report-indent=2
markers =
    iac001: IAC-001 Open Firewall Rule tests
    iac002: IAC-002 Unencrypted Storage tests
    iac003: IAC-003 Public Storage Access tests
    iac004: IAC-004 CIS Benchmark Compliance tests
